# ---------------------------------------------------------------------------
# Golf Course 3D Generator – docker-compose.yml
# ---------------------------------------------------------------------------
# Quick start:
#
#   # Single hole (by OSM way ID)
#   docker compose run --rm generator generate \
#       --dtm /data/terrain.tif \
#       --hole-id 123456789 \
#       --output /output/hole.stl
#
#   # All par-3 holes near a coordinate
#   docker compose run --rm generator generate-all \
#       --dtm /data/terrain.tif \
#       --lat 40.7128 --lon -74.0060 \
#       --radius 3000 \
#       --output-dir /output
# ---------------------------------------------------------------------------

services:
  generator:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: golf-course-3d-generator:latest
    volumes:
      # Place your DTM GeoTIFF files in ./data/
      - ./data:/data:ro
      # Generated STL / OBJ files will appear in ./output/
      - ./output:/output
    environment:
      # Optional: point at a self-hosted Overpass instance
      - OVERPASS_URL=${OVERPASS_URL:-https://overpass-api.de/api/interpreter}
